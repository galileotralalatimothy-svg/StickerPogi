<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZryoX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0c0d;
  --surface: #111113;
  --surface-2: #161618;
  --border: #1f1f22;
  --border-soft: #19191c;
  --text: #e8e8ea;
  --text-dim: #5a5a62;
  --text-muted: #2e2e34;
  --accent: #888888;
  --accent-dim: #555555;
  --green: #4ade80;
  --mono: 'DM Mono', monospace;
  --display: 'Syne', sans-serif;
}

*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  min-height: 100vh;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

header {
  position: sticky;
  top: 0;
  z-index: 100;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 0 32px;
  height: 60px;
  border-bottom: 1px solid var(--border);
  background: rgba(12, 12, 13, 0.88);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-mark {
  width: 26px;
  height: 26px;
  border: 1.5px solid var(--accent);
  display: grid;
  place-items: center;
  flex-shrink: 0;
  border-radius: 6px;
}

.logo-mark::after {
  content: '';
  width: 9px;
  height: 9px;
  background: var(--accent);
  border-radius: 2px;
}

.logo-names {
  display: flex;
  flex-direction: column;
  gap: 1px;
}

.logo-title {
  font-family: var(--display);
  font-size: 15px;
  font-weight: 800;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text);
  line-height: 1;
}

.logo-sub {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  line-height: 1;
}

.header-center {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.header-username {
  font-family: var(--display);
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: 0.04em;
  display: none;
}

.header-date {
  font-size: 9px;
  color: var(--text-dim);
  text-transform: uppercase;
}

.header-right {
  display: flex;
  justify-content: flex-end;
  align-items: center;
}

.header-count {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 0.08em;
  display: none;
  align-items: center;
  gap: 7px;
}

.header-count-dot {
  width: 5px;
  height: 5px;
  background: var(--accent);
  border-radius: 50%;
  animation: pulse 2s ease-in-out infinite;
  flex-shrink: 0;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.7); }
}

main {
  padding: 40px 32px 80px;
  max-width: 1080px;
  margin: 0 auto;
}

#loading, #empty, #error {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 50vh;
  gap: 16px;
  text-align: center;
}

.state-icon {
  width: 48px;
  height: 48px;
  border: 1px solid var(--border);
  display: grid;
  place-items: center;
  color: var(--text-muted);
  font-size: 20px;
  margin-bottom: 8px;
}

.state-title {
  font-family: var(--display);
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
}

.state-sub {
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 0.05em;
  max-width: 300px;
}

.spinner {
  width: 32px;
  height: 32px;
  border: 1.5px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 8px;
}

@keyframes spin { to { transform: rotate(360deg); } }

#content { display: none; }

.bar {
  margin-bottom: 28px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border-soft);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: none;
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 8px 18px;
  font-size: 11px;
  font-family: var(--mono);
  cursor: pointer;
  text-decoration: none;
  letter-spacing: 0.08em;
  outline: none;
  transition: all 0.15s;
  white-space: nowrap;
}

.btn:hover {
  border-color: #3a3a3e;
  color: var(--text);
  background: var(--surface);
}

.btn-primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #0c0c0d;
  font-weight: 600;
}

.btn-primary:hover {
  background: #aaaaaa;
  border-color: #aaaaaa;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 1px;
  background: var(--border-soft);
  border: 1px solid var(--border-soft);
}

.card {
  background: var(--bg);
  display: flex;
  flex-direction: column;
  transition: background 0.15s;
  animation: fadeUp 0.3s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.card:hover { background: var(--surface); }

.card-img {
  width: 100%;
  aspect-ratio: 1;
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

.card-img img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: none;
  transition: transform 0.2s ease;
}

.card:hover .card-img img { transform: scale(1.04); }

.card-img .lbl {
  font-size: 9px;
  color: var(--text-muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.card-img.shimmer::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.02) 50%, transparent 100%);
  background-size: 200% 100%;
  animation: shimmer 1.5s ease-in-out infinite;
}

@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

.card-foot {
  padding: 10px 11px 11px;
  border-top: 1px solid var(--border-soft);
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.card-id {
  font-size: 10px;
  color: var(--text-dim);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  letter-spacing: 0.04em;
  font-family: var(--mono);
}

.copy-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  width: 100%;
  padding: 6px;
  background: none;
  border: 1px solid var(--border-soft);
  color: var(--text-muted);
  font-size: 9px;
  font-family: var(--mono);
  cursor: pointer;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  outline: none;
  transition: all 0.15s;
}

.copy-btn:hover {
  border-color: #333338;
  color: var(--text-dim);
  background: var(--surface-2);
}

@media (max-width: 600px) {
  header { padding: 0 20px; grid-template-columns: auto 1fr auto; gap: 8px; }
  main { padding: 28px 20px 60px; }
  .grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark"></div>
    <div class="logo-names">
      <span class="logo-title">ZryoX</span>
      <span class="logo-sub">Sticker Gallery</span>
    </div>
  </div>

  <div class="header-center">
    <div class="header-username" id="header-username"></div>
    <div class="header-date" id="header-date"></div>
  </div>

  <div class="header-right">
    <div class="header-count" id="hcount">
      <div class="header-count-dot"></div>
      <span id="hcount-text"></span>
    </div>
  </div>
</header>

<main>
  <div id="loading">
    <div class="spinner"></div>
    <div class="state-title">Fetching stickers...</div>
    <div class="state-sub">Hang tight while we load the paste.</div>
  </div>

  <div id="empty" style="display:none">
    <div class="state-icon">⊗</div>
    <div class="state-title">Welcome to ZryoX</div>
  </div>

  <div id="error" style="display:none">
    <div class="state-icon">✕</div>
    <div class="state-title">Could not load</div>
    <div class="state-sub">The paste may be invalid, expired, or unreachable.</div>
  </div>

  <div id="content">
    <div class="bar">
      <button class="btn btn-primary" id="copy-all">
        <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="7" height="7" rx="1"/><path d="M8 4V2a1 1 0 0 0-1-1H2a1 1 0 0 0-1 1v5a1 1 0 0 0 1 1h2"/></svg>
        Copy All IDs
      </button>
      <a href="#" class="btn" id="raw-link" target="_blank">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        Raw
      </a>
    </div>
    <div class="grid" id="grid"></div>
  </div>
</main>

<script>
const pasteId = new URLSearchParams(location.search).get('id');

function showState(el) {
  ['loading','empty','error','content'].forEach(x => {
    document.getElementById(x).style.display = (x === el) ? (el === 'content' ? 'block' : 'flex') : 'none';
  });
}

function copyText(text, btn) {
  const fallback = () => {
    const ta = Object.assign(document.createElement('textarea'), { value: text, style: 'position:fixed;opacity:0' });
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
  };
  (navigator.clipboard ? navigator.clipboard.writeText(text).catch(fallback) : Promise.resolve(fallback())).then(() => {
    if (!btn) return;
    const orig = btn.innerHTML;
    btn.innerHTML = btn.innerHTML.replace(/Copy[\w\s]*/i, 'Copied!');
    setTimeout(() => { btn.innerHTML = orig; }, 1500);
  });
}

function parseIds(t) {
  return t.split('\n').map(l => l.trim()).filter(l => /^\d{8,}$/.test(l));
}

function parseMeta(t) {
  return {
    from: (t.match(/^Stickers from:\s*(.+)$/m) || [])[1]?.trim() || 'Unknown',
    date: (t.match(/^Date:\s*(.+)$/m) || [])[1]?.trim() || ''
  };
}

async function tryFetch(url) {
  const proxies = [url, `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}` ];
  for (const u of proxies) {
    try {
      const r = await fetch(u);
      if (r.ok) { const t = await r.text(); if (t) return t; }
    } catch (_) {}
  }
  return null;
}

async function fetchThumbBatch(batch) {
  const direct = `https://thumbnails.roblox.com/v1/assets?assetIds=${batch.join(',')}&returnPolicy=PlaceHolder&size=420x420&format=Png&isCircular=false`;
  try {
    const r = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(direct)}`);
    if (r.ok) {
      const d = await r.json();
      if (d.data) return d.data;
    }
  } catch (_) {}
  return [];
}

async function fetchThumbs(ids) {
  const map = {};
  for (let i = 0; i < ids.length; i += 50) {
    const items = await fetchThumbBatch(ids.slice(i, i + 50));
    items.forEach(item => { if (item.imageUrl && item.state !== 'Blocked') map[String(item.targetId)] = item.imageUrl; });
  }
  return map;
}

function makeCard(id, index) {
  const d = document.createElement('div');
  d.className = 'card';
  d.style.animationDelay = `${Math.min(index * 20, 300)}ms`;
  d.innerHTML = `
    <div class="card-img shimmer">
      <span class="lbl">···</span>
      <img alt="Sticker ${id}">
    </div>
    <div class="card-foot">
      <div class="card-id">${id}</div>
      <button class="copy-btn">
        <svg width="9" height="9" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="7" height="7" rx="1"/><path d="M8 4V2a1 1 0 0 0-1-1H2a1 1 0 0 0-1 1v5a1 1 0 0 0 1 1h2"/></svg>
        Copy ID
      </button>
    </div>`;
  d.querySelector('.copy-btn').onclick = function() { copyText(id, this); };
  return d;
}

function applyThumb(card, url) {
  const imgEl = card.querySelector('img');
  const lbl = card.querySelector('.lbl');
  const wrap = card.querySelector('.card-img');
  imgEl.onload = () => { lbl.style.display = 'none'; imgEl.style.display = 'block'; wrap.classList.remove('shimmer'); };
  imgEl.onerror = () => { lbl.textContent = 'no preview'; wrap.classList.remove('shimmer'); };
  imgEl.src = url;
}

async function init() {
  if (!pasteId) { showState('empty'); return; }

  const rawUrl = `https://pastefy.app/${pasteId}/raw`;
  document.getElementById('raw-link').href = rawUrl;
  
  const text = await tryFetch(rawUrl);
  if (!text) { showState('error'); return; }

  const ids = parseIds(text);
  if (!ids.length) { showState('error'); return; }

  const meta = parseMeta(text);
  const usernameEl = document.getElementById('header-username');
  usernameEl.textContent = meta.from;
  usernameEl.style.display = 'block';
  
  if(meta.date) {
      const dateEl = document.getElementById('header-date');
      dateEl.textContent = meta.date;
  }

  const hcount = document.getElementById('hcount');
  document.getElementById('hcount-text').textContent = `${ids.length} Sticker${ids.length !== 1 ? 's' : ''}`;
  hcount.style.display = 'flex';

  document.getElementById('copy-all').onclick = function() { copyText(ids.join('\n'), this); };

  const grid = document.getElementById('grid');
  const cards = {};
  ids.forEach((id, i) => { const c = makeCard(id, i); cards[id] = c; grid.appendChild(c); });

  showState('content');

  const thumbs = await fetchThumbs(ids);
  ids.forEach(id => {
    if (thumbs[id]) { applyThumb(cards[id], thumbs[id]); }
    else { const wrap = cards[id].querySelector('.card-img'); wrap.querySelector('.lbl').textContent = 'no preview'; wrap.classList.remove('shimmer'); }
  });
}

init();
</script>
</body>
</html>

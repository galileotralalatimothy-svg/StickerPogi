<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticker Gallery - Roblox IDs</title>
    <style>
        body {
            background: #0c0c0c;
            color: #eee;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 15px;
        }
        .header {
            text-align: center;
            padding: 15px;
            border-bottom: 1px solid #222;
            margin-bottom: 20px;
        }
        .title { font-size: 26px; margin: 0; }
        .stats { color: #aaa; font-size: 14px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 12px;
        }
        .card {
            background: #111;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #222;
            transition: all 0.15s;
        }
        .card:hover { transform: scale(1.04); box-shadow: 0 0 12px #222; }
        .image {
            aspect-ratio: 1/1;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .info {
            padding: 8px;
            text-align: center;
        }
        .id-text {
            font-family: monospace;
            font-size: 11px;
            color: #777;
            margin-bottom: 6px;
        }
        .btn {
            width: 100%;
            background: #1e1e1e;
            border: 1px solid #333;
            color: #ccc;
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }
        .btn:active { background: #333; }
        .loading, .error {
            text-align: center;
            margin: 60px 0;
            color: #888;
            font-style: italic;
        }
        .spinner {
            border: 4px solid #222;
            border-top: 4px solid #4caf50;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="title">Sticker Gallery</h1>
        <p class="stats" id="stats">Loading IDs...</p>
    </div>

    <div id="loading" class="loading">
        <div class="spinner"></div>
        Fetching from Pastefy...
    </div>
    <div id="error" class="error" style="display:none;"></div>

    <div class="grid" id="grid"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const pasteID = urlParams.get("id");

        if (!pasteID) {
            document.getElementById("loading").innerHTML = "Error: Walang Paste ID.<br>Gamitin: ?id=YOUR_PASTE_ID";
            return;
        }

        async function loadGallery() {
            try {
                const response = await fetch(`https://pastefy.app/${pasteID}/raw`);
                if (!response.ok) throw new Error("Invalid Paste ID or hindi ma-access");

                const text = await response.text();
                const ids = text.match(/\d{6,}/g) || []; // lahat ng 6+ digit numbers

                document.getElementById("stats").textContent = `${ids.length} stickers found`;

                if (ids.length === 0) {
                    document.getElementById("loading").innerHTML = "Walang nakitang valid na Roblox ID sa paste.";
                    return;
                }

                const grid = document.getElementById("grid");
                document.getElementById("loading").style.display = "none";

                ids.forEach(id => {
                    const card = document.createElement("div");
                    card.className = "card";

                    // Priority: assetdelivery (raw / no filter) → thumbnail fallback
                    card.innerHTML = `
                        <div class="image">
                            <img 
                                src="https://assetdelivery.roblox.com/v1/asset/?id=${id}" 
                                onerror="this.src='https://www.roblox.com/asset-thumbnail/image?assetId=${id}&width=420&height=420&format=png'; this.onerror=null;"
                                loading="lazy"
                                alt="Sticker ${id}">
                        </div>
                        <div class="info">
                            <div class="id-text">${id}</div>
                            <button class="btn" onclick="copyToClipboard('${id}', this)">Copy ID</button>
                        </div>
                    `;
                    grid.appendChild(card);
                });

            } catch (err) {
                document.getElementById("loading").style.display = "none";
                const errDiv = document.getElementById("error");
                errDiv.textContent = "Error: " + err.message + "\nSiguraduhing tama ang Paste ID.";
                errDiv.style.display = "block";
            }
        }

        function copyToClipboard(text, button) {
            navigator.clipboard.writeText(text).then(() => {
                const orig = button.textContent;
                button.textContent = "Copied!";
                button.style.background = "#2e7d32";
                setTimeout(() => {
                    button.textContent = orig;
                    button.style.background = "#1e1e1e";
                }, 1200);
            });
        }

        loadGallery();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZryoX's Closet</title>
    <style>
        body {
            background-color: #0c0c0c;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            line-height: 1.4;
        }    
        .header {
            padding-bottom: 15px;
            border-bottom: 1px solid #1f1f1f;
            margin-bottom: 25px;
        }
        .title {
            font-size: 26px;
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.5px;
        }
        .subtitle {
            font-size: 14px;
            color: #777;
            margin: 4px 0 0 0;
        }
        .user-section {
            margin-bottom: 25px;
            display: none; /* Lalabas lang kapag may data */
        }
        .username {
            font-size: 22px;
            font-weight: 700;
            margin: 0 0 4px 0;
        }
        .stats {
            font-size: 13px;
            color: #555;
            margin-bottom: 15px;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .btn {
            background-color: #1a1a1a;
            color: #efefef;
            border: 1px solid #2a2a2a;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .card {
            background-color: #111;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #1f1f1f;
            display: flex;
            flex-direction: column;
        }
        .image-container {
            aspect-ratio: 1/1;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }
        .image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .card-info {
            padding: 12px;
            background-color: #111;
            border-top: 1px solid #1a1a1a;
        }
        .asset-id {
            font-family: monospace;
            font-size: 12px;
            color: #444;
            margin-bottom: 10px;
        }
        .copy-btn {
            width: 100%;
            background-color: #1a1a1a;
            color: #999;
            border: 1px solid #222;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: 0.2s;
        }
        .copy-btn:hover {
            background-color: #222;
            color: #fff;
        }
        #loading-text {
            text-align: center;
            color: #555;
            margin-top: 50px;
        }
        .empty-state {
            display: none;
            text-align: center;
            margin-top: 150px;
        }
        .empty-state h2 { color: #444; font-size: 18px; margin-bottom: 10px; }
        .code-snippet { background: #1a1a1a; padding: 4px 8px; border-radius: 6px; color: #666; font-family: monospace; }
    </style>
</head>
<body>
    <div class="header">
        <p class="title">ZryoX's Closet</p>
        <p class="subtitle">Sticker Gallery</p>
    </div>
    
    <div id="loading-text">Fetching stickers...</div>
    
    <div id="empty-state" class="empty-state">
        <h2>No paste ID</h2>
        <p>Add <span class="code-snippet">?id=PASTE_ID</span> to the URL.</p>
    </div>

    <div class="user-section" id="user-info">
        <p class="username" id="user-title">Loading User...</p>
        <p class="stats" id="user-stats">0 stickers</p>
        <div class="button-group">
            <button class="btn" id="copy-all">Copy All IDs</button>
            <button class="btn" id="view-raw">RAW</button>
        </div>
    </div>
    
    <div class="grid" id="sticker-grid"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const pasteID = urlParams.get('id');
        const proxy = "https://api.allorigins.win/get?url=";

        async function init() {
            if (!pasteID) {
                document.getElementById('loading-text').style.display = "none";
                document.getElementById('empty-state').style.display = "block";
                return;
            }

            try {
                const targetUrl = `https://api.pastefy.app/paste/${pasteID}`;
                const response = await fetch(proxy + encodeURIComponent(targetUrl));
                const jsonWrapper = await response.json();
                
                // Ang AllOrigins ay binabalot ang data sa isang 'contents' string
                const data = JSON.parse(jsonWrapper.contents);
                
                if (!data || !data.paste) {
                    throw new Error("Invalid Paste Data");
                }

                const content = data.paste.content;
                const ids = content.match(/\d{6,}/g) || [];

                if (ids.length === 0) {
                    document.getElementById('loading-text').innerText = "No sticker IDs found in this paste.";
                    return;
                }

                // Ipakita ang UI elements
                document.getElementById('loading-text').style.display = "none";
                document.getElementById('user-info').style.display = "block";
                
                // I-update ang header (gaya ng "howaskedo_v2's Stickers")
                document.getElementById('user-title').innerText = (data.paste.title || "User") + "'s Stickers";
                document.getElementById('user-stats').innerText = `${ids.length} stickers · ${new Date().toLocaleDateString()}`;

                document.getElementById('view-raw').onclick = () => window.open(`https://pastefy.app/${pasteID}/raw`);
                document.getElementById('copy-all').onclick = () => {
                    navigator.clipboard.writeText(ids.join('\n'));
                    alert('All IDs copied!');
                };

                const grid = document.getElementById('sticker-grid');
                grid.innerHTML = ""; // Siguraduhing malinis ang grid

                ids.forEach(id => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    // Direct Roblox Thumbnail link
                    const thumbUrl = `https://www.roblox.com/asset-thumbnail/image?assetId=${id}&width=420&height=420&format=png`;

                    card.innerHTML = `
                        <div class="image-container">
                            <img src="${thumbUrl}" alt="Sticker" loading="lazy">
                        </div>
                        <div class="card-info">
                            <div class="asset-id">${id}</div>
                            <button class="copy-btn" onclick="copyId('${id}', this)">Copy ID</button>
                        </div>
                    `;
                    grid.appendChild(card);
                });

            } catch (err) {
                console.error(err);
                document.getElementById('loading-text').innerText = "Error loading stickers. Check if the Paste ID is valid.";
            }
        }

        window.copyId = (id, btn) => {
            navigator.clipboard.writeText(id);
            const originalText = btn.innerText;
            btn.innerText = "Copied";
            btn.style.color = "#fff";
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.color = "#999";
            }, 1000);
        };

        init();
    </script>
</body>
</html>

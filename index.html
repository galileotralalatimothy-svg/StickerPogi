<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZryoX's Closet</title>

<style>
body{
background:#0c0c0c;
color:#fff;
font-family:'Segoe UI',Roboto,Arial;
margin:0;
padding:20px;
}

.header{
border-bottom:1px solid #1f1f1f;
padding-bottom:15px;
margin-bottom:25px;
}

.title{
font-size:26px;
font-weight:700;
margin:0;
}

.subtitle{
font-size:14px;
color:#777;
margin-top:4px;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.card{
background:#111;
border-radius:12px;
overflow:hidden;
border:1px solid #1f1f1f;
}

.image-container{
aspect-ratio:1/1;
display:flex;
align-items:center;
justify-content:center;
padding:15px;
background:#000;
}

.image-container img{
max-width:100%;
max-height:100%;
}

.card-info{
padding:10px;
}

.asset-id{
font-family:monospace;
font-size:11px;
color:#555;
margin-bottom:8px;
}

.copy-btn{
width:100%;
background:#1a1a1a;
border:1px solid #222;
color:#999;
padding:10px;
border-radius:8px;
cursor:pointer;
}

.copy-btn:hover{
background:#222;
color:#fff;
}
</style>
</head>

<body>

<div class="header">
<p class="title">ZryoX's Closet</p>
<p class="subtitle">Sticker Gallery</p>
</div>

<div class="grid" id="sticker-grid"></div>

<script>

const params = new URLSearchParams(window.location.search)
const pasteID = params.get("id")

// kung walang id, stop agad
if(!pasteID){
throw new Error("No ID")
}

async function loadStickers(){

try{

const res = await fetch(`https://api.pastefy.app/paste/${pasteID}`)
const data = await res.json()

const content = data.paste.content

const ids = content.match(/\d{6,}/g) || []

const grid = document.getElementById("sticker-grid")

ids.forEach(id=>{

const card=document.createElement("div")
card.className="card"

card.innerHTML=`

<div class="image-container">
<img src="https://assetdelivery.roblox.com/v1/asset/?id=${id}">
</div>

<div class="card-info">
<div class="asset-id">${id}</div>

<button class="copy-btn" onclick="copyId('${id}',this)">
Copy ID
</button>
</div>

`

grid.appendChild(card)

})

}catch(e){

console.log("Failed loading stickers")

}

}

function copyId(id,btn){

navigator.clipboard.writeText(id)

let t=btn.innerText
btn.innerText="Copied"

setTimeout(()=>{
btn.innerText=t
},1000)

}

loadStickers()

</script>

</body>
</html>

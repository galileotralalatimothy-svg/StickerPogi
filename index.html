<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticker Gallery</title>
    <style>
        body {
            background: #0c0c0c;
            color: #fff;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .header {
            border-bottom: 1px solid #1f1f1f;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .title {
            font-size: 24px;
            font-weight: 700;
            margin: 0;
            color: #efefef;
        }
        .stats {
            font-size: 13px;
            color: #777;
            margin-top: 5px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 12px;
        }
        .card {
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #1f1f1f;
        }
        .image {
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }
        .image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .info {
            padding: 8px;
        }
        .id-text {
            font-family: monospace;
            font-size: 10px;
            color: #555;
            margin-bottom: 6px;
            text-align: center;
        }
        .btn {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #222;
            color: #ccc;
            padding: 8px 4px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
        }
        .loading {
            text-align: center;
            margin-top: 50px;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="header">
        <p class="title" id="page-title">Sticker Gallery</p>
        <p class="stats" id="stats">Ready</p>
    </div>

    <div id="loading" class="loading">Loading stickers...</div>
    <div class="grid" id="grid"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const pasteID = params.get("id");

        async function getNoFilter(id) {
            try {
                const res = await fetch(`https://thumbnails.roblox.com/v1/assets?assetIds=${id}&size=420x420&format=Png&isCircular=false`);
                const data = await res.json();
                if (data.data && data.data[0]) {
                    document.getElementById(`img-${id}`).src = data.data[0].imageUrl + "/noFilter";
                }
            } catch (e) {}
        }

        async function loadStickers() {
            if (!pasteID) {
                document.getElementById("loading").innerText = "No ID provided.";
                return;
            }

            try {
                const res = await fetch(`https://pastefy.app/${pasteID}/raw`);
                const text = await res.text();
                const ids = text.match(/\d{6,}/g) || [];
                
                document.getElementById("stats").innerText = `${ids.length} stickers found`;
                const grid = document.getElementById("grid");
                
                for (const id of ids) {
                    const card = document.createElement("div");
                    card.className = "card";
                    card.innerHTML = `
                        <div class="image">
                            <img id="img-${id}" src="https://tr.rbxcdn.com/53eb26848d5e6833c82d96200259f931/420/420/Image/Png/noFilter">
                        </div>
                        <div class="info">
                            <div class="id-text">${id}</div>
                            <button class="btn" onclick="copyId('${id}', this)">Copy ID</button>
                        </div>
                    `;
                    grid.appendChild(card);
                    getNoFilter(id);
                }
                document.getElementById("loading").style.display = "none";
            } catch (err) {
                document.getElementById("loading").innerText = "Error loading stickers.";
            }
        }

        function copyId(id, btn) {
            navigator.clipboard.writeText(id).then(() => {
                const oldText = btn.innerText;
                btn.innerText = "Copied!";
                setTimeout(() => { btn.innerText = oldText; }, 1000);
            });
        }

        loadStickers();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticker Gallery</title>
    <style>
        body {
            background: #0c0c0c;
            color: #fff;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .header {
            border-bottom: 1px solid #1f1f1f;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .title {
            font-size: 24px;
            font-weight: 700;
            margin: 0;
            color: #efefef;
        }

        .stats {
            font-size: 13px;
            color: #777;
            margin-top: 5px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 12px;
        }

        .card {
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #1f1f1f;
            transition: transform 0.2s;
        }

        .card:active {
            transform: scale(0.95);
        }

        .image {
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content:center;
            background: #000;
            position: relative;
        }

        .image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .info {
            padding: 8px;
        }

        .id-text {
            font-family: monospace;
            font-size: 10px;
            color: #555;
            margin-bottom: 6px;
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #222;
            color: #ccc;
            padding: 8px 4px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #222;
            color: #fff;
        }

        .loading {
            text-align: center;
            margin-top: 50px;
            color: #555;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="header">
        <p class="title" id="page-title">Loading Closet...</p>
        <p class="stats" id="stats">Initializing...</p>
    </div>

    <div id="loading" class="loading">Fetching stickers from Pastefy...</div>

    <div class="grid" id="grid"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const pasteID = params.get("id");

        if (!pasteID) {
            document.getElementById("loading").innerHTML = "Error: No Paste ID found.<br>Usage: ?id=YOUR_PASTE_ID";
        }

        async function loadStickers() {
            try {
                const res = await fetch(`https://pastefy.app/${pasteID}/raw`);
                if (!res.ok) throw new Error("Invalid ID");
                
                const text = await res.text();
                const ids = text.match(/\d{6,}/g) || [];
                
                document.getElementById("page-title").innerText = "Sticker Gallery";
                document.getElementById("stats").innerText = `${ids.length} stickers found`;
                
                const grid = document.getElementById("grid");
                const loadingDiv = document.getElementById("loading");

                for (const id of ids) {
                    const card = document.createElement("div");
                    card.className = "card";
                    card.innerHTML = `
                        <div class="image">
                            <img id="img-${id}" src="https://placehold.co/420x420/111/444?text=..." loading="lazy" alt="Sticker">
                        </div>
                        <div class="info">
                            <div class="id-text">${id}</div>
                            <button class="btn" onclick="copyId('${id}', this)">Copy ID</button>
                        </div>
                    `;
                    grid.appendChild(card);
                }

                loadingDiv.style.display = "none";

                for (let i = 0; i < ids.length; i += 100) {
                    const chunk = ids.slice(i, i + 100);
                    const proxyUrl = `https://thumbnails.roproxy.com/v1/assets?assetIds=${chunk.join(',')}&returnPolicy=PlaceHolder&size=420x420&format=Png`;
                    
                    fetch(proxyUrl)
                        .then(r => r.json())
                        .then(data => {
                            if (data && data.data) {
                                data.data.forEach(item => {
                                    const imgElement = document.getElementById(`img-${item.targetId}`);
                                    if (imgElement) {
                                        imgElement.src = item.state === "Completed" ? item.imageUrl : "https://placehold.co/420x420/111/ff3333?text=N/A";
                                    }
                                });
                            }
                        })
                        .catch(console.error);
                }

            } catch (err) {
                document.getElementById("loading").innerText = "Failed to load stickers. Check your Paste ID.";
            }
        }

        function copyId(id, btn) {
            navigator.clipboard.writeText(id).then(() => {
                const originalText = btn.innerText;
                btn.innerText = "Copied!";
                btn.style.background = "#2e7d32";
                btn.style.borderColor = "#4caf50";
                btn.style.color = "#fff";

                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.style.background = "#1a1a1a";
                    btn.style.borderColor = "#222";
                    btn.style.color = "#ccc";
                }, 1000);
            });
        }

        if (pasteID) {
            loadStickers();
        }
    </script>
</body>
</html>
